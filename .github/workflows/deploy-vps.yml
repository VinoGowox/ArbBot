name: Deploy To VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-vps-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Detect if remote user is root
        id: privilege
        shell: bash
        run: |
          set -euo pipefail
          is_root="$(ssh -i ~/.ssh/id_ed25519 "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" 'if [ "$(id -u)" -eq 0 ]; then echo true; else echo false; fi')"
          echo "is_root=$is_root" >> "$GITHUB_OUTPUT"

      - name: Upload deploy script
        shell: bash
        run: |
          set -euo pipefail
          scp -i ~/.ssh/id_ed25519 scripts/arbbot-deploy.sh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/arbbot-deploy.sh"

      - name: Install deploy script on VPS
        shell: bash
        env:
          VPS_SUDO_PASSWORD: ${{ secrets.VPS_SUDO_PASSWORD }}
        run: |
          set -euo pipefail
          if [ "${{ steps.privilege.outputs.is_root }}" = "true" ]; then
            ssh -i ~/.ssh/id_ed25519 "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "install -m 0755 /tmp/arbbot-deploy.sh /usr/local/bin/arbbot-deploy.sh; rm -f /tmp/arbbot-deploy.sh"
          elif ssh -i ~/.ssh/id_ed25519 "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "sudo -n install -m 0755 /tmp/arbbot-deploy.sh /usr/local/bin/arbbot-deploy.sh; rm -f /tmp/arbbot-deploy.sh"; then
            echo "Installed with passwordless sudo"
          elif [ -n "${VPS_SUDO_PASSWORD:-}" ]; then
            printf '%s\n' "$VPS_SUDO_PASSWORD" | ssh -i ~/.ssh/id_ed25519 "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "sudo -S -p '' install -m 0755 /tmp/arbbot-deploy.sh /usr/local/bin/arbbot-deploy.sh; rm -f /tmp/arbbot-deploy.sh"
          else
            echo "Cannot run privileged install on VPS." >&2
            echo "Configure sudoers for /usr/bin/install or set VPS_SUDO_PASSWORD secret." >&2
            echo "Example: deploy ALL=(root) NOPASSWD:/usr/bin/install" >&2
            exit 1
          fi

      - name: Run deploy on VPS
        shell: bash
        env:
          VPS_SUDO_PASSWORD: ${{ secrets.VPS_SUDO_PASSWORD }}
        run: |
          set -euo pipefail
          if [ "${{ steps.privilege.outputs.is_root }}" = "true" ]; then
            ssh -i ~/.ssh/id_ed25519 "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "FAIL_ONESHOT_START=0 /usr/local/bin/arbbot-deploy.sh"
          elif ssh -i ~/.ssh/id_ed25519 "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "FAIL_ONESHOT_START=0 sudo -n /usr/local/bin/arbbot-deploy.sh"; then
            echo "Deploy executed with passwordless sudo"
          elif [ -n "${VPS_SUDO_PASSWORD:-}" ]; then
            printf '%s\n' "$VPS_SUDO_PASSWORD" | ssh -i ~/.ssh/id_ed25519 "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "FAIL_ONESHOT_START=0 sudo -S -p '' /usr/local/bin/arbbot-deploy.sh"
          else
            echo "Cannot run deploy script with current privileges." >&2
            echo "Configure sudoers for /usr/local/bin/arbbot-deploy.sh or set VPS_SUDO_PASSWORD secret." >&2
            echo "Example: deploy ALL=(root) NOPASSWD:/usr/local/bin/arbbot-deploy.sh" >&2
            exit 1
          fi

      - name: Dump service diagnostics on failure
        if: failure()
        shell: bash
        env:
          VPS_SUDO_PASSWORD: ${{ secrets.VPS_SUDO_PASSWORD }}
        run: |
          set +e
          if [ "${{ steps.privilege.outputs.is_root }}" = "true" ]; then
            ssh -i ~/.ssh/id_ed25519 "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "systemctl --no-pager --full status arbbot-dashboard interexchange-arbitrage.timer interexchange-arbitrage.service" || true
            ssh -i ~/.ssh/id_ed25519 "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "journalctl -xeu interexchange-arbitrage.service --no-pager -n 200" || true
          elif ssh -i ~/.ssh/id_ed25519 "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "sudo -n systemctl --no-pager --full status arbbot-dashboard interexchange-arbitrage.timer interexchange-arbitrage.service"; then
            ssh -i ~/.ssh/id_ed25519 "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "sudo -n journalctl -xeu interexchange-arbitrage.service --no-pager -n 200" || true
          elif [ -n "${VPS_SUDO_PASSWORD:-}" ]; then
            printf '%s\n' "$VPS_SUDO_PASSWORD" | ssh -i ~/.ssh/id_ed25519 "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "sudo -S -p '' systemctl --no-pager --full status arbbot-dashboard interexchange-arbitrage.timer interexchange-arbitrage.service" || true
            printf '%s\n' "$VPS_SUDO_PASSWORD" | ssh -i ~/.ssh/id_ed25519 "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "sudo -S -p '' journalctl -xeu interexchange-arbitrage.service --no-pager -n 200" || true
          else
            echo "Diagnostics skipped: no root and no sudo access." >&2
          fi
